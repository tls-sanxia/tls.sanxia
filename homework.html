<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>各年級回家作業公告系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grade-card { transition: transform 0.2s; }
        /* 管理員模式專屬樣式 */
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <!-- 頁首與管理入口 -->
        <header class="text-center mb-10 relative">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">📚 每日回家作業公告</h1>
            <p class="text-slate-500 mt-2">即時更新各年級教學進度與作業</p>
            
            <!-- 右上角隱藏鎖頭：點擊輸入密碼 -->
            <button onclick="toggleAdmin()" class="absolute -top-2 -right-2 p-3 text-slate-300 hover:text-indigo-600 transition-all" title="管理員登入">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </button>
        </header>

        <!-- 管理者新增區域 (驗證後顯示) -->
        <div id="adminPanel" class="admin-only bg-white p-6 rounded-2xl shadow-lg border-2 border-indigo-500 mb-10 animate-fade-in">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-indigo-700 font-bold flex items-center">
                    <span class="mr-2">🔓 管理者模式</span>
                    <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded">身分已驗證</span>
                </h3>
                <button onclick="logout()" class="text-xs text-slate-400 hover:text-rose-500 underline">退出管理模式</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">選擇年級</label>
                    <select id="gradeSelect" class="w-full rounded-lg border-slate-200 border p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="1">高一</option>
                        <option value="2">高二</option>
                        <option value="3">高三</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-600 mb-1">作業內容</label>
                    <input type="text" id="taskInput" placeholder="例如：數學：講義 P.15-P.20" class="w-full rounded-lg border-slate-200 border p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <button onclick="addTask()" class="bg-indigo-600 text-white font-bold py-2.5 px-6 rounded-lg hover:bg-indigo-700 shadow-md transition-all">
                    發布作業
                </button>
            </div>
        </div>

        <!-- 三個年級的展示區塊 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- 高一區塊 -->
            <div class="grade-card bg-white rounded-2xl shadow-sm border-t-4 border-emerald-500 overflow-hidden">
                <div class="p-5 bg-emerald-50 border-b border-emerald-100 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-emerald-800">高一回家作業</h2>
                    <span class="bg-emerald-500 text-white text-xs px-2 py-1 rounded-full">Grade 10</span>
                </div>
                <ul id="list-1" class="p-4 space-y-3 min-h-[200px]"></ul>
            </div>

            <!-- 高二區塊 -->
            <div class="grade-card bg-white rounded-2xl shadow-sm border-t-4 border-blue-500 overflow-hidden">
                <div class="p-5 bg-blue-50 border-b border-blue-100 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-blue-800">高二回家作業</h2>
                    <span class="bg-blue-500 text-white text-xs px-2 py-1 rounded-full">Grade 11</span>
                </div>
                <ul id="list-2" class="p-4 space-y-3 min-h-[200px]"></ul>
            </div>

            <!-- 高三區塊 -->
            <div class="grade-card bg-white rounded-2xl shadow-sm border-t-4 border-rose-500 overflow-hidden">
                <div class="p-5 bg-rose-50 border-b border-rose-100 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-rose-800">高三回家作業</h2>
                    <span class="bg-rose-500 text-white text-xs px-2 py-1 rounded-full">Grade 12</span>
                </div>
                <ul id="list-3" class="p-4 space-y-3 min-h-[200px]"></ul>
            </div>

        </div>
    </div>

    <script>
        // --- 設定管理密碼 ---
        const ADMIN_PASSWORD = "3019"; 

        document.addEventListener('DOMContentLoaded', () => {
            // 檢查 Session 是否已登入
            if (sessionStorage.getItem('isTeacherAdmin') === 'true') {
                document.body.classList.add('admin-mode');
            }
            loadTasks();
        });

        // 管理登入邏輯
        function toggleAdmin() {
            if (document.body.classList.contains('admin-mode')) {
                if(confirm("是否要登出管理者模式？")) logout();
            } else {
                const pass = prompt("請輸入管理者授權密碼：");
                if (pass === ADMIN_PASSWORD) {
                    document.body.classList.add('admin-mode');
                    sessionStorage.setItem('isTeacherAdmin', 'true');
                    loadTasks(); 
                } else if (pass !== null) {
                    alert("密碼錯誤，無法開啟編輯功能。");
                }
            }
        }

        function logout() {
            document.body.classList.remove('admin-mode');
            sessionStorage.removeItem('isTeacherAdmin');
            loadTasks();
        }

        // 新增作業
        function addTask() {
            const grade = document.getElementById('gradeSelect').value;
            const content = document.getElementById('taskInput').value;
            const date = new Date().toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });

            if (!content) return alert('請輸入作業內容');

            let tasks = JSON.parse(localStorage.getItem(`grade_tasks_${grade}`)) || [];
            tasks.unshift({ id: Date.now(), content, date });
            localStorage.setItem(`grade_tasks_${grade}`, JSON.stringify(tasks));

            document.getElementById('taskInput').value = '';
            loadTasks();
        }

        // 刪除作業
        function deleteTask(grade, id) {
            if (!confirm('確定要刪除這條作業記錄嗎？')) return;
            let tasks = JSON.parse(localStorage.getItem(`grade_tasks_${grade}`));
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem(`grade_tasks_${grade}`, JSON.stringify(tasks));
            loadTasks();
        }

        // 渲染畫面
        function loadTasks() {
            const isAdmin = document.body.classList.contains('admin-mode');
            
            [1, 2, 3].forEach(grade => {
                const list = document.getElementById(`list-${grade}`);
                const tasks = JSON.parse(localStorage.getItem(`grade_tasks_${grade}`)) || [];
                
                list.innerHTML = tasks.length === 0 ? 
                    '<li class="text-slate-400 text-center py-10 italic">今日尚無作業更新</li>' : '';

                tasks.forEach(t => {
                    list.innerHTML += `
                        <li class="group flex items-center justify-between p-3 bg-slate-50 rounded-lg hover:bg-white hover:shadow-sm border border-transparent hover:border-slate-100 transition-all">
                            <div class="flex flex-col">
                                <span class="text-[10px] text-slate-400 font-mono uppercase">Update: ${t.date}</span>
                                <span class="text-slate-700 font-medium">${t.content}</span>
                            </div>
                            ${isAdmin ? `
                                <button onclick="deleteTask(${grade}, ${t.id})" class="text-slate-300 hover:text-rose-500 transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            ` : ''}
                        </li>
                    `;
                });
            });
        }
    </script>
</body>
