    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: linear-gradient(180deg, #1A6B2F 0%, #3A9E48 50%, #f0fdf4 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .grade-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .grade-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* 管理員模式專屬樣式 */
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pt-24 pb-12">

                    <span class="text-2xl font-bold brand-text tracking-tight text-green-800">三峽天龍教室</span>
                </div>

                <div class="hidden md:flex items-center gap-5 text-sm lg:text-base">
                    <a href="https://tianlong-edu.pixnet.net/blog" target="_blank" class="hover:text-green-700 font-medium transition">🏆天龍傳奇🏆</a>
                    <div class="relative group inline-block">
                        <a href="news.html" class="hover:text-green-700 font-medium transition flex items-center">
                            最新消息
                            <svg class="w-4 h-4 ml-1 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                                <a href="early-bird.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-green-50 hover:text-green-700 transition">早鳥優惠</a>

    <section>
  <a href="https://www.facebook.com/tianlongTL1/" target="_blank" class="social-fb px-6 py-2.5 rounded-xl transition">Facebook</a>
                        <a href="https://youtube.com/channel/UC5cws6RPAUvKdTsYJmYCj2A?si=PHjPshvmNgszfv-r" target="_blank" class="social-yt px-6 py-2.5 rounded-xl transition">YouTube</a></section>
    <!-- 主要內容區：作業公告系統 -->
    <main class="max-w-7xl mx-auto px-4 mt-10">
        <header class="text-center mb-10 relative">
            <h1 class="text-3xl font-extrabold text-white drop-shadow-md tracking-tight">📚 每日回家作業公告</h1>
            <p class="text-green-50 mt-2">即時更新各年級教學進度與作業</p>
            
            <button onclick="toggleAdmin()" class="absolute -top-2 -right-2 p-3 text-white/50 hover:text-white transition-all" title="管理員登入">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </button>
        </header>

        <!-- 管理者面板 -->
        <div id="adminPanel" class="admin-only bg-white p-6 rounded-2xl shadow-xl border-2 border-green-500 mb-10">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-green-700 font-bold flex items-center">
                    <span class="mr-2">🔓 管理者模式</span>
                    <span class="text-xs bg-green-100 text-green-600 px-2 py-0.5 rounded">身分已驗證</span>
                </h3>
                <button onclick="logout()" class="text-xs text-slate-400 hover:text-rose-500 underline">退出管理模式</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-sm font-semibold text-slate-600 mb-1">選擇年級</label>
                    <select id="gradeSelect" class="w-full rounded-lg border-slate-200 border p-2.5 outline-none focus:ring-2 focus:ring-green-500">
                        <option value="1">高一</option>
                        <option value="2">高二</option>
                        <option value="3">高三</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-600 mb-1">作業內容</label>
                    <input type="text" id="taskInput" placeholder="例如：數學：講義 P.15-P.20" class="w-full rounded-lg border-slate-200 border p-2.5 outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <button onclick="addTask()" class="bg-green-600 text-white font-bold py-2.5 px-6 rounded-lg hover:bg-green-700 shadow-md transition-all">
                    發布作業
                </button>
            </div>
        </div>

        <!-- 年級作業展示區 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 高一 -->
            <div class="grade-card border-t-4 border-emerald-500">
                <div class="p-5 bg-emerald-50 border-b border-emerald-100 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-emerald-800">高一回家作業</h2>
                    <span class="bg-emerald-500 text-white text-xs px-2 py-1 rounded-full">Grade 10</span>
                </div>
                <ul id="list-1" class="p-4 space-y-3 min-h-[200px]"></ul>
            </div>

            <!-- 高二 -->
            <div class="grade-card border-t-4 border-blue-500">
                <div class="p-5 bg-blue-50 border-b border-blue-100 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-blue-800">高二回家作業</h2>
                    <span class="bg-blue-500 text-white text-xs px-2 py-1 rounded-full">Grade 11</span>
                </div>
                <ul id="list-2" class="p-4 space-y-3 min-h-[200px]"></ul>
            </div>

            <!-- 高三 -->
            <div class="grade-card border-t-4 border-rose-500">
                <div class="p-5 bg-rose-50 border-b border-rose-100 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-rose-800">高三回家作業</h2>
                    <span class="bg-rose-500 text-white text-xs px-2 py-1 rounded-full">Grade 12</span>
                </div>
                <ul id="list-3" class="p-4 space-y-3 min-h-[200px]"></ul>
            </div>
        </div>
    </main>

    <script>
        const ADMIN_PASSWORD = "3019"; 

        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('isTeacherAdmin') === 'true') {
                document.body.classList.add('admin-mode');
            }
            loadTasks();
            
            // 手機版選單切換
            const menuBtn = document.getElementById('menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            if(menuBtn) {
                menuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }
        });

        function toggleAdmin() {
            if (document.body.classList.contains('admin-mode')) {
                if(confirm("是否要登出管理者模式？")) logout();
            } else {
                const pass = prompt("請輸入管理者授權密碼：");
                if (pass === ADMIN_PASSWORD) {
                    document.body.classList.add('admin-mode');
                    sessionStorage.setItem('isTeacherAdmin', 'true');
                    loadTasks(); 
                } else if (pass !== null) {
                    alert("密碼錯誤。");
                }
            }
        }

        function logout() {
            document.body.classList.remove('admin-mode');
            sessionStorage.removeItem('isTeacherAdmin');
            loadTasks();
        }

        function addTask() {
            const grade = document.getElementById('gradeSelect').value;
            const content = document.getElementById('taskInput').value;
            const date = new Date().toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });

            if (!content) return alert('請輸入內容');

            let tasks = JSON.parse(localStorage.getItem(`grade_tasks_${grade}`)) || [];
            tasks.unshift({ id: Date.now(), content, date });
            localStorage.setItem(`grade_tasks_${grade}`, JSON.stringify(tasks));

            document.getElementById('taskInput').value = '';
            loadTasks();
        }

        function deleteTask(grade, id) {
            if (!confirm('確定要刪除嗎？')) return;
            let tasks = JSON.parse(localStorage.getItem(`grade_tasks_${grade}`));
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem(`grade_tasks_${grade}`, JSON.stringify(tasks));
            loadTasks();
        }

        function loadTasks() {
            const isAdmin = document.body.classList.contains('admin-mode');
            [1, 2, 3].forEach(grade => {
                const list = document.getElementById(`list-${grade}`);
                const tasks = JSON.parse(localStorage.getItem(`grade_tasks_${grade}`)) || [];
                list.innerHTML = tasks.length === 0 ? '<li class="text-slate-400 text-center py-10 italic">今日尚無作業更新</li>' : '';

                tasks.forEach(t => {
                    list.innerHTML += `
                        <li class="group flex items-center justify-between p-3 bg-slate-50 rounded-lg hover:bg-white hover:shadow-sm border border-transparent hover:border-slate-100 transition-all">
                            <div class="flex flex-col">
                                <span class="text-[10px] text-slate-400 font-mono">UPDATE: ${t.date}</span>
                                <span class="text-slate-700 font-medium">${t.content}</span>
                            </div>
                            ${isAdmin ? `
                                <button onclick="deleteTask(${grade}, ${t.id})" class="text-slate-300 hover:text-rose-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            ` : ''}
                        </li>`;
                });
            });
        }
    </script>
</body>
