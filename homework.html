<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三峽天龍教育中心 - 雲端作業系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #f0fdf4; }
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }
        .grade-card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto text-center mb-10">
        <h1 class="text-3xl font-bold text-green-800">📚 雲端作業公告系統</h1>
        <button onclick="toggleAdmin()" class="text-xs text-green-600/50 hover:text-green-600 mt-2">管理員登入</button>
    </header>

    <!-- 管理者面板 -->
    <div id="adminPanel" class="admin-only max-w-7xl mx-auto bg-white p-6 rounded-2xl shadow-xl border-2 border-green-500 mb-10">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div>
                <label class="block text-sm font-bold text-gray-600 mb-1">年級</label>
                <select id="gradeSelect" class="w-full border rounded-lg p-2">
                    <option value="1">高一</option>
                    <option value="2">高二</option>
                    <option value="3">高三</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-600 mb-1">內容</label>
                <input type="text" id="taskInput" placeholder="輸入作業內容..." class="w-full border rounded-lg p-2">
            </div>
            <button onclick="addTask()" class="bg-green-600 text-white font-bold py-2 rounded-lg hover:bg-green-700">發布公告</button>
        </div>
    </div>

    <!-- 作業展示區 -->
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="grade-card border-t-4 border-emerald-500">
            <div class="p-4 bg-emerald-50 font-bold">高一作業</div>
            <ul id="list-1" class="p-4 space-y-2"></ul>
        </div>
        <div class="grade-card border-t-4 border-blue-500">
            <div class="p-4 bg-blue-50 font-bold">高二作業</div>
            <ul id="list-2" class="p-4 space-y-2"></ul>
        </div>
        <div class="grade-card border-t-4 border-rose-500">
            <div class="p-4 bg-rose-50 font-bold">高三作業</div>
            <ul id="list-3" class="p-4 space-y-2"></ul>
        </div>
    </div>

    <!-- 1. 引入 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

    <script>
        // 2. Firebase 設定 (請在此處貼上您在 Firebase 控制台取得的資訊)
        const firebaseConfig = {
            apiKey: "您的API_KEY",
            authDomain: "您的專案ID.firebaseapp.com",
            databaseURL: "您的資料庫URL",
            projectId: "您的專案ID",
            storageBucket: "您的專案ID.appspot.com",
            messagingSenderId: "您的傳送ID",
            appId: "您的APP_ID"
        };

        // 初始化
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const ADMIN_PASSWORD = "3019";

        // 3. 監聽雲端資料庫
        function listenToTasks() {
            const isAdmin = document.body.classList.contains('admin-mode');
            
            database.ref('tasks').on('value', (snapshot) => {
                const allData = snapshot.val() || {};
                [1, 2, 3].forEach(grade => {
                    const listElement = document.getElementById(`list-${grade}`);
                    listElement.innerHTML = "";
                    
                    const tasks = allData[grade] ? Object.entries(allData[grade]) : [];
                    // 排序：最新的在上面
                    tasks.sort((a, b) => b[1].timestamp - a[1].timestamp);

                    if (tasks.length === 0) {
                        listElement.innerHTML = "<li class='text-gray-400 text-sm italic'>暫無內容</li>";
                        return;
                    }

                    tasks.forEach(([key, item]) => {
                        listElement.innerHTML += `
                            <li class="flex justify-between items-center p-2 bg-gray-50 rounded border">
                                <div>
                                    <p class="text-[10px] text-gray-400">${item.date}</p>
                                    <p class="text-gray-700">${item.content}</p>
                                </div>
                                ${isAdmin ? `<button onclick="deleteTask(${grade}, '${key}')" class="text-red-400 hover:text-red-600 text-xl">×</button>` : ''}
                            </li>
                        `;
                    });
                });
            });
        }

        // 4. 新增資料
        function addTask() {
            const grade = document.getElementById('gradeSelect').value;
            const content = document.getElementById('taskInput').value;
            if (!content) return alert("請輸入內容");

            const newTask = {
                content: content,
                date: new Date().toLocaleDateString('zh-TW'),
                timestamp: Date.now()
            };

            database.ref(`tasks/${grade}`).push(newTask).then(() => {
                document.getElementById('taskInput').value = "";
            });
        }

        // 5. 刪除資料
        function deleteTask(grade, key) {
            if (confirm("確定刪除？")) {
                database.ref(`tasks/${grade}/${key}`).remove();
            }
        }

        // 管理權限切換
        function toggleAdmin() {
            if (document.body.classList.contains('admin-mode')) {
                document.body.classList.remove('admin-mode');
                sessionStorage.removeItem('isTeacherAdmin');
            } else {
                const pass = prompt("請輸入管理碼：");
                if (pass === ADMIN_PASSWORD) {
                    document.body.classList.add('admin-mode');
                    sessionStorage.setItem('isTeacherAdmin', 'true');
                }
            }
            listenToTasks(); // 重新整理顯示
        }

        // 初始執行
        if (sessionStorage.getItem('isTeacherAdmin') === 'true') {
            document.body.classList.add('admin-mode');
        }
        listenToTasks();
    </script>
</body>
</html>
