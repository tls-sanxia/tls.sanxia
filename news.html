<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三峽天龍教育中心 - 高中全科專業輔導</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: linear-gradient(180deg, #1A6B2F 0%, #3A9E48 50%, #b4fa8c 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .tag { @apply text-xs px-3 py-1 rounded-full mb-3 inline-block font-bold text-white shadow-sm; }
        .course-title { @apply text-xl font-bold mb-2 flex items-center gap-2; }
        .course-desc { @apply text-gray-600 text-sm leading-relaxed; }

        /* --- 懸浮按鈕專用 CSS --- */
        .side-float-wrapper {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }
        .floating-btn {
            display: flex;
            align-items: center;
            background: white;
            padding: 12px 18px;
            border-radius: 30px 0 0 30px;
            box-shadow: -2px 5px 15px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 50px; /* 預設只看得到圖示/首字 */
            overflow: hidden;
            white-space: nowrap;
        }
        .floating-btn:hover {
            width: 150px; /* 移上去展開 */
            background: #1A6B2F;
            color: white;
        }
        .bg-fb:hover { background: #1877F2; }
        .bg-yt:hover { background: #FF0000; }
        .btn-text { margin-left: 10px; }
    </style>
</head>
<body class="pb-10">

                    <img src="300788435_440411104773251_3159946660684644182_n.jpg" alt="LOGO" class="w-10 h-10 rounded-full object-cover shadow-sm" style="border: 2px solid #fff; outline: 1.5px solid #1A6B2F; outline-offset: 1px;">

                </div>

                    <a href="https://tianlong-edu.pixnet.net/blog" target="_blank" class="nav-link font-medium text-orange-600">🏆學長姐見證</a>
                    <a href="tel:02-2672-2088" class="bg-[#1A6B2F] text-white px-5 py-2 rounded-full hover:bg-green-800 transition shadow-md">📞 02-2672-2088</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="side-float-wrapper">

        <a href="#info" class="floating-btn" data-short="MAP">

        <a href="https://www.facebook.com/tianlongTL1/" target="_blank" class="floating-btn bg-fb">

    <header class="max-w-6xl mx-auto px-5 py-32 text-center text-white">

                        <a href="tel:0226722088" class="text-3xl font-black text-gray-900 hover:text-emerald-600 transition tracking-tighter">02 2672 2088</a>
                    </div>
                </div>
                <div class="flex flex-col justify-end gap-4">
                    <a href="https://www.facebook.com/tianlongTL1/" class="bg-blue-600 text-white text-center py-4 rounded-2xl font-bold hover:bg-blue-700 transition shadow-lg">官方 Facebook 私訊小編</a>
                    <a href="https://www.youtube.com/@天龍-f7m" class="bg-red-600 text-white text-center py-4 rounded-2xl font-bold hover:bg-red-700 transition shadow-lg">YouTube 頻道看教學</a>

    </main>

    <footer class="mt-16 py-10 text-center text-emerald-900 font-bold text-sm">
        <p>© 2026 三峽天龍教室. All Rights Reserved.</p>

    </footer>
</body>
</html>
